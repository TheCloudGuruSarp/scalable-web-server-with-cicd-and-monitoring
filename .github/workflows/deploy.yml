name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ secrets.ECR_REPOSITORY_FRONTEND }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_BACKEND: ${{ secrets.ECS_SERVICE_BACKEND }}
  ECS_SERVICE_FRONTEND: ${{ secrets.ECS_SERVICE_FRONTEND }}
  ECS_TASK_DEFINITION_NAME_BACKEND: ${{ secrets.ECS_TASK_DEFINITION_NAME_BACKEND }} # e.g., internal-dashboard-backend-task
  ECS_TASK_DEFINITION_NAME_FRONTEND: ${{ secrets.ECS_TASK_DEFINITION_NAME_FRONTEND }}
  CONTAINER_NAME_BACKEND: "internal-dashboard-backend-container"
  CONTAINER_NAME_FRONTEND: "internal-dashboard-frontend-container"

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # --- Backend Deployment ---
    - name: Build, tag, and push backend image
      id: build-image-backend
      run: |
        docker build -t $ECR_REPOSITORY_BACKEND:${{ github.sha }} ./backend
        docker push $ECR_REPOSITORY_BACKEND:${{ github.sha }}
        echo "image=$ECR_REPOSITORY_BACKEND:${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Download backend task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_NAME_BACKEND }} --query taskDefinition > task-definition-backend.json

    - name: Fill in new image ID in backend task definition
      id: task-def-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition-backend.json
        container-name: ${{ env.CONTAINER_NAME_BACKEND }}
        image: ${{ steps.build-image-backend.outputs.image }}

    - name: Deploy backend task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_BACKEND }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # --- Frontend Deployment ---
    - name: Build, tag, and push frontend image
      id: build-image-frontend
      run: |
        docker build -t $ECR_REPOSITORY_FRONTEND:${{ github.sha }} ./frontend
        docker push $ECR_REPOSITORY_FRONTEND:${{ github.sha }}
        echo "image=$ECR_REPOSITORY_FRONTEND:${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Download frontend task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_NAME_FRONTEND }} --query taskDefinition > task-definition-frontend.json

    - name: Fill in new image ID in frontend task definition
      id: task-def-frontend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition-frontend.json
        container-name: ${{ env.CONTAINER_NAME_FRONTEND }}
        image: ${{ steps.build-image-frontend.outputs.image }}

    - name: Deploy frontend task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_FRONTEND }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
